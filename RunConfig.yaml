#Necessary
read_location: "Raw_data"                             #the name of the store directory DO NOT INCLUDE / just raw name in case of absolute or small relative do not include final /
Ref_genome_path: References/NC_001526.4.fasta         #provide complete path (relative or absolute) to the Reference genome
insert_size: "150"
platform: "ILLUMINA"                                  #put in all caps

#Mode selection --- if not specified will turn on all extras and default to fastq mode
Run_QC: true
Run_HaplotypeReconstruction: true
Input_format: "fastq"                                   #Either <"b"/"bam"> (provide a bam file) or paired-end <"f"/"fastq"> (<> indicates argument)
Index_for_IGV: true

#Optional
batch: "Test"                                         
Variant_Caller: "lofreq"                           #Options: <lofreq>, <gatk>, <cliquesnv> amd <shorah>  ##CAP SENSITIVE --- optios are contained within < > ## Default: LOFREQ
min_overlap_length: "100"                          #SAVAGE default is set to 60% of read length - Ensure you have adequate memory availability for both your depth and genome size


#Not implemented
#Base_Recalibration: "lofreq"                          #Options: <bqsr> or <lofreq> # lofreqindelqual is the default and represents <lofreq> - BQSR currently non-functional
#Variants_database:                                    #Not currently used
#Filtering_Cutoffs: 'DP>=30 && AF>=0.01 && QUAL>20'    #Default >>>>>> "DP>=30 && AF>=0.01 && QUAL>20" -------currently adjusted in the subworkflow "VariantCalling.nf"






